<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Agent — Debugger Console</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --mono: "Consolas", "Monaco", monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }
        .status-dot.connected { background: var(--green); }
        .status-dot.disconnected { background: var(--red); }
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            overflow: hidden;
        }
        .left-panel, .right-panel {
            overflow-y: auto;
            padding: 12px;
        }
        .right-panel {
            border-left: 1px solid var(--border);
            background: var(--panel);
        }
        section {
            border: 1px solid var(--border);
            margin-bottom: 12px;
            background: var(--panel);
        }
        section h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            background: #1c2128;
        }
        .section-body { padding: 10px; }
        input, textarea, button {
            font-family: var(--mono);
            font-size: 12px;
        }
        textarea, input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 3px;
        }
        button {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 6px;
            margin-top: 6px;
        }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        button.danger { border-color: var(--red); color: var(--red); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #transcript, #event-log {
            height: 120px;
            overflow-y: auto;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #state-machine {
            font-size: 12px;
            line-height: 1.8;
        }
        .state-node {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--muted);
        }
        .state-node.active {
            border-color: var(--green);
            color: var(--green);
            background: rgba(63, 185, 80, 0.1);
        }
        .state-arrow { color: var(--muted); margin: 0 4px; }
        #latency-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .metric {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px;
            text-align: center;
        }
        .metric .label { font-size: 10px; color: var(--muted); }
        .metric .value { font-size: 18px; color: var(--accent); margin-top: 4px; }
        footer {
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            font-size: 12px;
        }
        #trace-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }
        #trace-detail {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            max-height: 70vh;
            overflow-y: auto;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 16px;
            z-index: 100;
        }
        #trace-detail pre {
            background: var(--bg);
            padding: 10px;
            overflow-x: auto;
            font-size: 11px;
        }
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
        .log-entry { margin-bottom: 2px; }
        .log-entry.error { color: var(--red); }
        .log-entry.state { color: var(--yellow); }
        .log-entry.latency { color: var(--green); }
        #chart-area canvas { max-height: 200px; }
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 6px;
        }
        .badge.safe { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .badge.barge { background: rgba(248,81,73,0.2); color: var(--red); }
    </style>
</head>
<body>
    <header>
        <h1>FINANCE AGENT / DEBUGGER CONSOLE</h1>
        <div>
            <span class="status-dot disconnected" id="ws-status"></span>
            <span id="ws-label">DISCONNECTED</span>
            <span class="badge safe" id="safe-mode-badge" style="display:none">SAFE MODE</span>
            <span class="badge barge" id="barge-badge" style="display:none">BARGE-IN</span>
        </div>
    </header>

    <main>
        <div class="left-panel">
            <section>
                <h2>Session Config</h2>
                <div class="section-body">
                    <label>Portfolio (SYMBOL:QTY)</label>
                    <textarea id="portfolio" rows="2" placeholder="AAPL:100, MSFT:50">AAPL:100, MSFT:50</textarea>
                    <button class="primary" id="connect-btn">Connect WebSocket</button>
                </div>
            </section>

            <section>
                <h2>Input</h2>
                <div class="section-body">
                    <input type="text" id="query-input" placeholder="What's my tech exposure?">
                    <button class="primary" id="send-text-btn" disabled>Send Text Query</button>
                    <button id="record-btn" disabled>Record Voice</button>
                    <button class="danger" id="interrupt-btn" disabled>Force Interrupt</button>
                    <p style="margin-top:8px;color:var(--muted)" id="record-status">Idle</p>
                </div>
            </section>

            <section>
                <h2>Agent Response (streaming)</h2>
                <div class="section-body">
                    <div id="transcript">Waiting for input...</div>
                    <audio id="audio-player" controls style="width:100%;margin-top:8px"></audio>
                    <div id="chart-area" style="margin-top:10px"></div>
                </div>
            </section>
        </div>

        <div class="right-panel">
            <section>
                <h2>State Visualizer (LangGraph)</h2>
                <div class="section-body" id="state-machine">
                    <span class="state-node active" data-state="IDLE">IDLE</span>
                </div>
            </section>

            <section>
                <h2>Latency Breakdown (last utterance)</h2>
                <div class="section-body">
                    <div id="latency-box">
                        <div class="metric"><div class="label">STT</div><div class="value" id="lat-stt">—</div></div>
                        <div class="metric"><div class="label">LLM</div><div class="value" id="lat-llm">—</div></div>
                        <div class="metric"><div class="label">TTS</div><div class="value" id="lat-tts">—</div></div>
                        <div class="metric"><div class="label">TOTAL</div><div class="value" id="lat-total">—</div></div>
                    </div>
                </div>
            </section>

            <section>
                <h2>Event Log</h2>
                <div class="section-body">
                    <div id="event-log"></div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <span>Trace: <span id="trace-link">—</span></span>
        <span id="call-id-display">call: —</span>
        <span id="gen-id-display">gen: —</span>
    </footer>

    <div class="overlay" id="overlay"></div>
    <div id="trace-detail"><button onclick="closeTrace()">Close</button><pre id="trace-pre"></pre></div>

    <script>
        const STATES = ["IDLE","PORTFOLIO_VERIFICATION","FETCHING_MARKET","NEWS_ANALYSIS","ANALYZING","VISUALIZATION","RESPONDING","INTERRUPTED","ERROR"];
        let ws = null;
        let callId = null;
        let generationId = null;
        let traceId = null;
        let audioSeq = 0;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isAISpeaking = false;
        let audioContext = null;
        let audioQueue = [];
        let currentSource = null;
        let vadInterval = null;

        const $ = id => document.getElementById(id);

        function log(msg, cls = "") {
            const el = $("event-log");
            const line = document.createElement("div");
            line.className = `log-entry ${cls}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.prepend(line);
            while (el.children.length > 100) el.removeChild(el.lastChild);
        }

        function renderStateMachine(active) {
            const container = $("state-machine");
            container.innerHTML = STATES.map((s, i) => {
                const cls = s === active ? "state-node active" : "state-node";
                const arrow = i < STATES.length - 1 ? '<span class="state-arrow">→</span>' : '';
                return `<span class="${cls}" data-state="${s}">${s}</span>${arrow}`;
            }).join("");
        }

        function setConnected(connected) {
            $("ws-status").className = `status-dot ${connected ? "connected" : "disconnected"}`;
            $("ws-label").textContent = connected ? "CONNECTED" : "DISCONNECTED";
            $("send-text-btn").disabled = !connected;
            $("record-btn").disabled = !connected;
            $("interrupt-btn").disabled = !connected;
        }

        function connectWS() {
            const portfolio = $("portfolio").value.trim();
            if (!portfolio) { alert("Enter portfolio"); return; }

            const proto = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${proto}//${location.host}/ws/voice`);

            ws.onopen = () => {
                setConnected(true);
                ws.send(JSON.stringify({ type: "session.start", portfolio, user_id: "debugger" }));
                log("WebSocket connected", "state");
            };

            ws.onclose = () => {
                setConnected(false);
                log("WebSocket disconnected", "error");
            };

            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                if (msg.generation_id && generationId && msg.generation_id !== generationId) return;
                handleEvent(msg);
            };

            ws.onerror = () => log("WebSocket error", "error");
        }

        function handleEvent(msg) {
            const t = msg.type;
            if (msg.call_id) { callId = msg.call_id; $("call-id-display").textContent = `call: ${callId.slice(0,8)}`; }
            if (msg.generation_id) { generationId = msg.generation_id; $("gen-id-display").textContent = `gen: ${generationId.slice(0,8)}`; }

            switch (t) {
                case "session.ready":
                    log(`Session ready: ${msg.agent_name}`, "state");
                    break;
                case "state.transition":
                    log(`${msg.from_state} → ${msg.to_state}`, "state");
                    renderStateMachine(msg.to_state);
                    break;
                case "stt.final":
                    log(`STT: ${msg.text}`);
                    $("transcript").textContent = "";
                    break;
                case "llm.token":
                    $("transcript").textContent += msg.text;
                    break;
                case "tts.chunk":
                    isAISpeaking = true;
                    enqueueAudio(msg.data, msg.encoding || "pcm_s16le");
                    break;
                case "latency.breakdown":
                    const lat = msg.latency || {};
                    $("lat-stt").textContent = `${lat.stt_ms || 0}ms`;
                    $("lat-llm").textContent = `${lat.llm_ms || 0}ms`;
                    $("lat-tts").textContent = `${lat.tts_ms || 0}ms`;
                    $("lat-total").textContent = `${lat.total_ms || 0}ms`;
                    log(`Latency: STT=${lat.stt_ms}ms LLM=${lat.llm_ms}ms TTS=${lat.tts_ms}ms`, "latency");
                    break;
                case "trace.info":
                    traceId = msg.trace_id;
                    $("trace-link").textContent = traceId;
                    break;
                case "interrupt.ack":
                    flushAudio();
                    isAISpeaking = false;
                    $("barge-badge").style.display = "inline";
                    setTimeout(() => $("barge-badge").style.display = "none", 2000);
                    log(`Interrupt ack: cancelled ${msg.cancelled_generation?.slice(0,8)}`, "error");
                    renderStateMachine("INTERRUPTED");
                    break;
                case "error":
                    log(`ERROR [${msg.code}]: ${msg.message}`, "error");
                    if (msg.safe_mode) $("safe-mode-badge").style.display = "inline";
                    break;
                case "chart.render":
                    renderChart(msg.config);
                    break;
                case "response.complete":
                    isAISpeaking = false;
                    traceId = msg.trace_id || traceId;
                    $("trace-link").textContent = traceId || "—";
                    log("Response complete", "latency");
                    break;
            }
        }

        const audioByteChunks = [];
        function enqueueAudio(b64, encoding) {
            const bytes = atob(b64);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            audioByteChunks.push(arr);
            const total = audioByteChunks.reduce((s, a) => s + a.length, 0);
            const merged = new Uint8Array(total);
            let offset = 0;
            for (const chunk of audioByteChunks) {
                merged.set(chunk, offset);
                offset += chunk.length;
            }
            const mime = encoding === "mp3" ? "audio/mp3" : "audio/wav";
            $("audio-player").src = URL.createObjectURL(new Blob([merged], { type: mime }));
            if (isAISpeaking) $("audio-player").play().catch(() => {});
        }

        function base64ToBlob(b64, mime) {
            const bytes = atob(b64);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            return new Blob([arr], { type: mime });
        }

        function flushAudio() {
            audioByteChunks.length = 0;
            $("audio-player").pause();
            $("audio-player").src = "";
            if (currentSource) { try { currentSource.stop(); } catch(e) {} }
        }

        function sendInterrupt(reason = "manual") {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            generationId = crypto.randomUUID();
            flushAudio();
            ws.send(JSON.stringify({ type: "interrupt", reason, generation_id: generationId }));
            log(`Sent interrupt (${reason})`, "error");
        }

        function sendTextQuery() {
            const text = $("query-input").value.trim();
            if (!text || !ws) return;
            generationId = crypto.randomUUID();
            audioByteChunks.length = 0;
            $("transcript").textContent = "";
            ws.send(JSON.stringify({ type: "text.query", text, generation_id: generationId }));
            log(`Text query: ${text}`);
        }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = audioContext || new AudioContext();
            setupVAD(stream);
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            audioSeq = 0;
            generationId = crypto.randomUUID();

            mediaRecorder.ondataavailable = async (e) => {
                if (e.data.size > 0 && ws?.readyState === WebSocket.OPEN) {
                    const buf = await e.data.arrayBuffer();
                    ws.send(JSON.stringify({
                        type: "audio.chunk",
                        data: arrayBufferToBase64(buf),
                        seq: audioSeq++,
                        generation_id: generationId,
                    }));
                }
            };

            mediaRecorder.start(100);
            isRecording = true;
            $("record-status").textContent = "Recording... (VAD active)";
            $("record-btn").textContent = "Stop & Send";
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                $("record-status").textContent = "Processing...";
                setTimeout(() => {
                    if (ws?.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: "utterance.end", generation_id: generationId }));
                    }
                    $("record-status").textContent = "Idle";
                    $("record-btn").textContent = "Record Voice";
                }, 300);
            }
            if (vadInterval) clearInterval(vadInterval);
        }

        function setupVAD(stream) {
            const ctx = audioContext || new AudioContext();
            const source = ctx.createMediaStreamSource(stream);
            const analyser = ctx.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            vadInterval = setInterval(() => {
                analyser.getByteFrequencyData(data);
                const energy = data.reduce((a, b) => a + b, 0) / data.length;
                if (energy > 30 && isAISpeaking) {
                    sendInterrupt("vad");
                    isAISpeaking = false;
                }
            }, 50);
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = "";
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function renderChart(config) {
            const area = $("chart-area");
            area.innerHTML = "<canvas id='chart'></canvas>";
            new Chart($("chart"), config);
            log("Chart rendered", "state");
        }

        async function openTrace() {
            if (!traceId) return;
            const resp = await fetch(`/api/traces/${traceId}`);
            const data = await resp.json();
            $("trace-pre").textContent = JSON.stringify(data, null, 2);
            $("trace-detail").style.display = "block";
            $("overlay").style.display = "block";
        }

        function closeTrace() {
            $("trace-detail").style.display = "none";
            $("overlay").style.display = "none";
        }

        $("connect-btn").onclick = connectWS;
        $("send-text-btn").onclick = sendTextQuery;
        $("interrupt-btn").onclick = () => sendInterrupt("manual");
        $("record-btn").onclick = () => isRecording ? stopRecording() : startRecording();
        $("trace-link").onclick = openTrace;
        $("overlay").onclick = closeTrace;

        renderStateMachine("IDLE");
    </script>
</body>
</html>
